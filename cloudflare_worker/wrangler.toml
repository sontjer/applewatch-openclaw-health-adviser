name = "apple-health-ingest"
main = "index.js"
compatibility_date = "2026-03-17"
workers_dev = true

[observability]
enabled = true

[vars]
GITHUB_OWNER = "sontjer"
GITHUB_REPO = "data_sync_analysis"
GITHUB_BRANCH = "main"
METRIC_WHITELIST = "heartRateVariabilitySDNN,oxygenSaturation,restingHeartRate,respiratoryRate,appleSleepingWristTemperature,heartRate,stepCount,activeEnergyBurned,basalEnergyBurned,appleExerciseTime,flightsClimbed,vo2Max,sleepAnalysis,environmentalAudioExposure,appleStandHour,walkingRunningDistance"
MAX_REQ_BYTES = "8000000"

# set with:
# wrangler secret put INGEST_KEY
# wrangler secret put GITHUB_TOKEN
